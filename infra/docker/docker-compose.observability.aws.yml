# Docker Compose overlay — observability stack on AWS EBS storage.
# Layered after docker-compose.aws.yml when --observability is set.
#
# Usage (generated by dalston-aws, not used directly):
#   docker compose \
#     -f docker-compose.yml \
#     -f infra/docker/docker-compose.aws.yml \
#     -f infra/docker/docker-compose.ghcr.yml \
#     -f infra/docker/docker-compose.observability.aws.yml \
#     --profile observability up -d

# Ship container logs to Loki via the Docker log driver plugin.
# The plugin must be installed on the host (see dalston-aws bootstrap).
# Uses localhost:3100 because the log driver runs in the Docker daemon
# (host network), not inside a container — it cannot resolve compose DNS.
x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3100/loki/api/v1/push"
    loki-batch-size: "400"
    loki-retries: "3"
    max-size: "20m"
    max-file: "2"

services:
  prometheus:
    volumes:
      - /data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=4GB'

  grafana:
    volumes:
      - /data/grafana:/var/lib/grafana
    logging: *loki-logging

  loki:
    volumes:
      - /data/loki:/loki
      - /data/dalston/docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro

  jaeger:
    environment:
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "10000"

  gateway:
    logging: *loki-logging

  orchestrator:
    logging: *loki-logging

  stt-prepare:
    logging: *loki-logging

  metrics-exporter:
    logging: *loki-logging
