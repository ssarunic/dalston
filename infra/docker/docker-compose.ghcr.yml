# Docker Compose override to pull pre-built images from GHCR instead of building locally.
#
# Usage (CPU control plane):
#   docker compose -f docker-compose.yml \
#     -f infra/docker/docker-compose.aws.yml \
#     -f infra/docker/docker-compose.ghcr.yml \
#     --env-file .env.aws \
#     --profile local-infra pull
#   docker compose -f docker-compose.yml \
#     -f infra/docker/docker-compose.aws.yml \
#     -f infra/docker/docker-compose.ghcr.yml \
#     --env-file .env.aws \
#     --profile local-infra up -d --no-build
#
# Requires .env.aws to contain:
#   GHCR_REGISTRY=ghcr.io/<owner>/<repo>
#   IMAGE_TAG=latest  (or a specific commit SHA)
#
# Images must exist in GHCR (pushed by GitHub Actions or `make push-ghcr`).

services:
  gateway:
    image: ${GHCR_REGISTRY}/gateway:${IMAGE_TAG:-latest}

  orchestrator:
    image: ${GHCR_REGISTRY}/orchestrator:${IMAGE_TAG:-latest}

  stt-prepare:
    image: ${GHCR_REGISTRY}/stt-prepare:${IMAGE_TAG:-latest}

  # metrics-exporter reuses the gateway image
  metrics-exporter:
    image: ${GHCR_REGISTRY}/gateway:${IMAGE_TAG:-latest}

  # GPU engines (used by GPU worker in split mode)
  stt-transcribe-onnx:
    image: ${GHCR_REGISTRY}/stt-onnx:${IMAGE_TAG:-latest}

  stt-diarize-pyannote-4.0:
    image: ${GHCR_REGISTRY}/stt-diarize-pyannote:${IMAGE_TAG:-latest}
