# Docker Compose override for AWS deployment
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f infra/docker/docker-compose.aws.yml up -d --profile local-infra --profile gpu

services:
  gateway:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      DALSTON_S3_PUBLIC_ENDPOINT_URL: ${DALSTON_S3_PUBLIC_ENDPOINT_URL:-}
      # No S3_ENDPOINT - SDK auto-detects on EC2
      # No credentials - uses IAM instance role
    # Bind to all interfaces for Tailscale access
    ports:
      - "8000:8000"

  orchestrator:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}

  postgres:
    volumes:
      - /data/postgres:/var/lib/postgresql

  redis:
    volumes:
      - /data/redis:/data

  stt-prepare:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}

  stt-transcribe-faster-whisper:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-transcribe-nemo:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      HF_HOME: /data/models
      NEMO_CACHE: /data/models
    volumes:
      - /data/models:/data/models

  stt-transcribe-onnx:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-align-phoneme:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-pii-detect-presidio:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-diarize-pyannote-4.0:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-diarize-nemo-msdd:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      NEMO_CACHE: /data/models
    volumes:
      - /data/models:/data/models

  # NeMo Sortformer diarization (GPU)
  stt-diarize-nemo-sortformer:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      NEMO_CACHE: /data/models
    volumes:
      - /data/models:/data/models

  # NeMo Sortformer diarization (CPU)
  stt-diarize-nemo-sortformer-cpu:
    environment:
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
      DALSTON_S3_REGION: ${DALSTON_S3_REGION}
      AWS_REGION: ${AWS_REGION}
      NEMO_CACHE: /data/models
    volumes:
      - /data/models:/data/models


# Exclude MinIO services - using S3 instead
# The base docker-compose.yml may define minio and minio-init
# but they won't be started unless explicitly included
