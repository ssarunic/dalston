# Docker Compose override for AWS deployment
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f infra/docker/docker-compose.aws.yml up -d --profile local-infra --profile gpu

x-aws-s3: &aws-s3
  DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET}
  DALSTON_S3_REGION: ${DALSTON_S3_REGION}
  DALSTON_S3_ENDPOINT_URL: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: ${AWS_REGION}

services:
  # Disable MinIO — using real S3 on AWS
  minio:
    profiles: [disabled]
  minio-init:
    profiles: [disabled]

  gateway:
    environment:
      <<: *aws-s3
      DALSTON_S3_PUBLIC_ENDPOINT_URL: ${DALSTON_S3_PUBLIC_ENDPOINT_URL:-}
    # Bind to all interfaces for Tailscale access
    ports:
      - "8000:8000"

  orchestrator:
    environment:
      <<: *aws-s3

  postgres:
    volumes:
      - /data/postgres:/var/lib/postgresql

  redis:
    volumes:
      - /data/redis:/data

  stt-prepare:
    environment:
      <<: *aws-s3

  stt-transcribe-faster-whisper:
    environment:
      <<: *aws-s3
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-transcribe-nemo:
    environment:
      <<: *aws-s3
      HF_HOME: /data/models
      NEMO_CACHE: /data/models
    volumes:
      - /data/models:/data/models

  stt-transcribe-onnx:
    environment:
      <<: *aws-s3
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-align-phoneme:
    environment:
      <<: *aws-s3
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-pii-detect-presidio:
    environment:
      <<: *aws-s3
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-diarize-pyannote-4.0:
    environment:
      <<: *aws-s3
      HF_HOME: /data/models
    volumes:
      - /data/models:/data/models

  stt-diarize-nemo-msdd:
    environment:
      <<: *aws-s3
      NEMO_CACHE: /data/models
    volumes:
      - /data/models:/data/models

  # NeMo Sortformer diarization (GPU)
  stt-diarize-nemo-sortformer:
    environment:
      <<: *aws-s3
      NEMO_CACHE: /data/models
    volumes:
      - /data/models:/data/models

  # NeMo Sortformer diarization (CPU)
  stt-diarize-nemo-sortformer-cpu:
    environment:
      <<: *aws-s3
      NEMO_CACHE: /data/models
    volumes:
      - /data/models:/data/models


  # Prometheus needs Tailscale DNS to resolve GPU worker hostnames
  prometheus:
    dns:
      - 100.100.100.100  # Tailscale MagicDNS
      - 127.0.0.53       # systemd-resolved fallback
    volumes:
      - /data/prometheus:/prometheus

# Exclude MinIO services - using S3 instead
# The base docker-compose.yml may define minio and minio-init
# but they won't be started unless explicitly included
