version: 2
updates:
  # Python dependencies (main server)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python

  # Python SDK
  - package-ecosystem: pip
    directory: "/sdk"
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types:
