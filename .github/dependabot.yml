version: 2
updates:
  # Python dependencies (main server)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      # OpenTelemetry packages must move in lockstep — core 1.X.Y pins
      # opentelemetry-semantic-conventions==0.(X+21)bY, which every
      # instrumentation-* and test-utils package also pins. Splitting them
      # across PRs produces unsatisfiable resolves until all merge.
      opentelemetry:
        patterns:
          - "opentelemetry-*"
        update-types:
          - major
          - minor
          - patch
      minor-and-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python

  # Python SDK
  - package-ecosystem: pip
    directory: "/sdk"
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python

  # CLI
  - package-ecosystem: pip
    directory: "/cli"
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python

  # Engine dependencies
  - package-ecosystem: pip
    directory: "/engines/stt-transcribe/faster-whisper"
    schedule:
      interval: monthly
    groups:
      all:
        update-types:
          - major
          - minor
          - patch
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python
      - engines

  - package-ecosystem: pip
    directory: "/engines/stt-transcribe/onnx"
    schedule:
      interval: monthly
    groups:
      all:
        update-types:
          - major
          - minor
          - patch
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python
      - engines

  - package-ecosystem: pip
    directory: "/engines/stt-transcribe/hf-asr"
    schedule:
      interval: monthly
    groups:
      all:
        update-types:
          - major
          - minor
          - patch
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python
      - engines

  - package-ecosystem: pip
    directory: "/engines/stt-transcribe/nemo"
    schedule:
      interval: monthly
    groups:
      all:
        update-types:
          - major
          - minor
          - patch
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python
      - engines

  - package-ecosystem: pip
    directory: "/engines/stt-transcribe/riva"
    schedule:
      interval: monthly
    groups:
      all:
        update-types:
          - major
          - minor
          - patch
    # nvidia-riva-client 2.25.1 (latest) pins protobuf==6.33.5. Until a
    # newer client ships, protobuf 7+ is unsatisfiable in this engine.
    ignore:
      - dependency-name: "protobuf"
        versions: [">=7.0.0"]
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python
      - engines

  - package-ecosystem: pip
    directory: "/engines/stt-transcribe/vllm-asr"
    schedule:
      interval: monthly
    groups:
      all:
        update-types:
          - major
          - minor
          - patch
    # vllm[audio] 0.20.x requires numpy>=1.25,<2.4. Bumping numpy to 2.4+
    # is unsatisfiable until vllm releases a numpy-2.4-compatible build.
    ignore:
      - dependency-name: "numpy"
        versions: [">=2.4"]
    reviewers:
      - sasasarunic
    labels:
      - dependencies
      - python
      - engines

  - package-ecosystem: pip
    directory: "/engines/stt-align/phoneme-align"
