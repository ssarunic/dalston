# .github/workflows/build-engine-prepare.yml
#
# Builds the audio-prepare engine image and pushes to GHCR.
# Runs natively on x86 — no QEMU needed.
#
# Triggers:
#   - Push to main that changes engine code or shared dalston package
#   - Manual dispatch (for rebuilding without code changes)
#
# Prerequisites (one-time setup):
#   - Repository must have packages write permission enabled for GitHub Actions
#
# Note: stt-prepare depends on dalston/base-engine:latest which is built
# locally. The workflow builds base-engine first, then stt-prepare on top.

name: Build Audio Prepare Engine

on:
  push:
    branches: [main]
    paths:
      - 'engines/stt-prepare/audio-prepare/**'
      - 'dalston/**'
      - 'pyproject.toml'
      - 'docker/Dockerfile.base-engine'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/stt-prepare

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base-engine and stt-prepare
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build base-engine first (stt-prepare depends on it)
          docker build \
            -t dalston/base-engine:latest \
            -f docker/Dockerfile.base-engine \
            .

          # Build stt-prepare on top of base-engine
          docker build \
            -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            -t $REGISTRY/$IMAGE_NAME:latest \
            -f engines/stt-prepare/audio-prepare/Dockerfile \
            .

          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$IMAGE_NAME:latest

          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`$REGISTRY/$IMAGE_NAME:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`$REGISTRY/$IMAGE_NAME:latest\`" >> $GITHUB_STEP_SUMMARY
