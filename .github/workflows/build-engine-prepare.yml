# .github/workflows/build-engine-prepare.yml
#
# Builds the audio-prepare engine image and pushes to ECR.
# Runs natively on x86 — no QEMU needed.
#
# Triggers:
#   - Push to main that changes engine code or shared dalston package
#   - Manual dispatch (for rebuilding without code changes)
#
# Prerequisites (one-time setup):
#   1. Create ECR repository: dalston/stt-prepare
#   2. IAM role and OIDC provider (shared with engine workflows)
#   3. Set repository variable: AWS_ACCOUNT_ID
#
# Note: stt-prepare depends on dalston/base-engine:latest which is built
# locally. The workflow builds base-engine first, then stt-prepare on top.

name: Build Audio Prepare Engine

on:
  push:
    branches: [main]
    paths:
      - 'engines/stt-prepare/audio-prepare/**'
      - 'dalston/**'
      - 'pyproject.toml'
      - 'docker/Dockerfile.base-engine'
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_REPO: dalston/stt-prepare

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build base-engine and stt-prepare
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build base-engine first (stt-prepare depends on it)
          docker build \
            -t dalston/base-engine:latest \
            -f docker/Dockerfile.base-engine \
            .

          # Build stt-prepare on top of base-engine
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -f engines/stt-prepare/audio-prepare/Dockerfile \
            .

          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest

          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`$ECR_REGISTRY/$ECR_REPO:latest\`" >> $GITHUB_STEP_SUMMARY
