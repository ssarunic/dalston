# .github/workflows/build-engine-pyannote-diarize.yml
#
# Builds the Pyannote 4.0 diarization engine image and pushes to GHCR.
# Runs natively on x86 — no QEMU, no 40-minute builds.
#
# Triggers:
#   - Push to main that changes engine code or its Dockerfile
#   - Manual dispatch (for rebuilding without code changes)
#
# Prerequisites (one-time setup):
#   - Repository must have packages write permission enabled for GitHub Actions

name: Build Pyannote Diarize Engine

on:
  push:
    branches: [main]
    paths:
      - 'engines/stt-diarize/pyannote-4.0/**'
      - 'dalston/**'
      - 'pyproject.toml'
      - 'docker/Dockerfile.base-pyannote'
    tags: ['v*']
  workflow_dispatch:  # manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/stt-diarize-pyannote

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # x86 native — no QEMU needed
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base-pyannote and engine
        run: |
          # Build base-pyannote first (engine depends on it)
          docker build \
            --build-arg DEVICE=cuda \
            -t dalston/base-pyannote:latest \
            -f docker/Dockerfile.base-pyannote \
            .

          # Build engine on top of base-pyannote
          TAGS="-t $REGISTRY/$IMAGE_NAME:latest"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="$TAGS -t $REGISTRY/$IMAGE_NAME:$VERSION"
          fi

          docker build \
            --build-arg DEVICE=cuda \
            $TAGS \
            -f engines/stt-diarize/pyannote-4.0/Dockerfile \
            .

          docker push --all-tags $REGISTRY/$IMAGE_NAME

          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`$REGISTRY/$IMAGE_NAME:latest\`" >> $GITHUB_STEP_SUMMARY
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "- \`$REGISTRY/$IMAGE_NAME:$VERSION\`" >> $GITHUB_STEP_SUMMARY
          fi
