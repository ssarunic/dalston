# .github/workflows/build-gateway.yml
#
# Builds the Gateway image (with web console) and pushes to GHCR.
# Runs natively on x86 — no QEMU needed.
#
# Triggers:
#   - Push to main that changes gateway code, web console, or shared dalston package
#   - Manual dispatch (for rebuilding without code changes)
#
# Prerequisites (one-time setup):
#   - Repository must have packages write permission enabled for GitHub Actions

name: Build Gateway

on:
  push:
    branches: [main]
    paths:
      - 'dalston/**'
      - 'web/**'
      - 'docker/Dockerfile.gateway'
      - 'pyproject.toml'
      - 'alembic/**'
      - 'models/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gateway

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            -t $REGISTRY/$IMAGE_NAME:latest \
            -f docker/Dockerfile.gateway \
            .

          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$IMAGE_NAME:latest

          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`$REGISTRY/$IMAGE_NAME:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`$REGISTRY/$IMAGE_NAME:latest\`" >> $GITHUB_STEP_SUMMARY
