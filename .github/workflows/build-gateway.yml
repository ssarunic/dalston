# .github/workflows/build-gateway.yml
#
# Builds the Gateway image (with web console) and pushes to ECR.
# Runs natively on x86 — no QEMU needed.
#
# Triggers:
#   - Push to main that changes gateway code, web console, or shared dalston package
#   - Manual dispatch (for rebuilding without code changes)
#
# Prerequisites (one-time setup):
#   1. Create ECR repository: dalston/gateway
#   2. IAM role and OIDC provider (shared with engine workflows)
#   3. Set repository variable: AWS_ACCOUNT_ID

name: Build Gateway

on:
  push:
    branches: [main]
    paths:
      - 'dalston/**'
      - 'web/**'
      - 'docker/Dockerfile.gateway'
      - 'pyproject.toml'
      - 'alembic/**'
      - 'models/**'
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_REPO: dalston/gateway

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -f docker/Dockerfile.gateway \
            .

          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest

          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`$ECR_REGISTRY/$ECR_REPO:latest\`" >> $GITHUB_STEP_SUMMARY
