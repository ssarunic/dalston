name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uvx ruff@0.9.4 check .

      - name: Format check
        run: uvx ruff@0.9.4 format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[gateway,orchestrator,session-router,dev]" mypy

      - name: Run mypy
        run: uv run mypy dalston/

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  validate-engines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv venv && uv pip install pyyaml jsonschema

      - name: Validate engine.yaml files
        run: uv run python -m dalston.tools.validate_engine --all

  compose-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate compose config combinations
        run: |
          docker compose -f docker-compose.yml config > /tmp/compose-base.yaml
          docker compose --profile local-infra -f docker-compose.yml config > /tmp/compose-local-infra.yaml
          docker compose --profile local-object-storage -f docker-compose.yml config > /tmp/compose-local-object-storage.yaml
          docker compose --profile local-infra --profile local-object-storage -f docker-compose.yml config > /tmp/compose-local-all-infra.yaml
          docker compose --profile gpu -f docker-compose.yml config > /tmp/compose-gpu.yaml
          docker compose --profile observability -f docker-compose.yml config > /tmp/compose-observability.yaml
          S3_BUCKET=test-bucket AWS_REGION=us-west-2 docker compose -f docker-compose.yml -f infra/docker/docker-compose.aws.yml config > /tmp/compose-aws.yaml
          S3_BUCKET=test-bucket AWS_REGION=us-west-2 docker compose --profile local-infra --profile gpu -f docker-compose.yml -f infra/docker/docker-compose.aws.yml config > /tmp/compose-aws-local-gpu.yaml

      - name: Validate catalog-compose mapping
        run: python scripts/validate_catalog_compose.py

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[gateway,orchestrator,dev]"

      - name: Run tests
        run: uv run pytest
        env:
          REDIS_URL: redis://localhost:6379
