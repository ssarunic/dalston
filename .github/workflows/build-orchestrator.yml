# .github/workflows/build-orchestrator.yml
#
# Builds the Orchestrator image and pushes to GHCR.
# Runs natively on x86 — no QEMU needed.
#
# Triggers:
#   - Push to main that changes orchestrator code or shared dalston package
#   - Manual dispatch (for rebuilding without code changes)
#
# Prerequisites (one-time setup):
#   - Repository must have packages write permission enabled for GitHub Actions

name: Build Orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'dalston/**'
      - 'docker/Dockerfile.orchestrator'
      - 'pyproject.toml'
      - 'alembic/**'
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/orchestrator

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAGS="-t $REGISTRY/$IMAGE_NAME:latest"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="$TAGS -t $REGISTRY/$IMAGE_NAME:$VERSION"
          fi

          docker build \
            $TAGS \
            -f docker/Dockerfile.orchestrator \
            .

          docker push --all-tags $REGISTRY/$IMAGE_NAME

          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`$REGISTRY/$IMAGE_NAME:latest\`" >> $GITHUB_STEP_SUMMARY
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "- \`$REGISTRY/$IMAGE_NAME:$VERSION\`" >> $GITHUB_STEP_SUMMARY
          fi
