# Dalston - Modular Audio Transcription Server
#
# Container Naming Convention:
#   {type}-{domain}-{stage}-{impl}[-v{version}]
#   - type: batch (file processing) or rt (realtime streaming)
#   - domain: stt (speech-to-text), tts (text-to-speech, future)
#   - stage: prepare, transcribe, align, diarize, pii_detect, audio_redact, refine
#   - impl: whisper, parakeet, pyannote, presidio, etc.
#   - version: v31, v40, etc. (only when multiple versions coexist)
#
# Image Sharing Strategy:
#   Services that use the same Dockerfile share a single image via the `image:` directive.
#   Only the first service has a `build:` section; others just reference the image.
#   This saves disk space and ensures consistency.
#
# Usage:
#   docker compose up -d                                                    # Start infrastructure + CPU engines
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d   # GPU engines (CUDA builds + GPU resources)
#   docker compose --profile observability up -d                            # Include Jaeger, Prometheus, Grafana

# ============================================================
# EXTENSION FIELDS (shared configurations)
# ============================================================

# Common environment variables for all engines
x-common-env: &common-env
  REDIS_URL: redis://redis:6379
  DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET:-dalston-artifacts}
  DALSTON_S3_REGION: ${DALSTON_S3_REGION:-eu-west-2}
  DALSTON_S3_ENDPOINT_URL: http://minio:9000
  DALSTON_S3_PUBLIC_ENDPOINT_URL: ${DALSTON_S3_PUBLIC_ENDPOINT_URL:-}
  DALSTON_RUNTIME_REVISION: ${DALSTON_RUNTIME_REVISION:-unknown}
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  DALSTON_LOG_LEVEL: ${DALSTON_LOG_LEVEL:-INFO}
  DALSTON_LOG_FORMAT: ${DALSTON_LOG_FORMAT:-json}
  # M78: Host machine hostname for infrastructure topology grouping.
  # In Docker, socket.gethostname() returns the container ID. This passes
  # the host's real hostname so engines on the same machine group together.
  DALSTON_HOST_HOSTNAME: ${HOSTNAME:-localhost}

# Observability environment variables
x-observability-env: &observability-env
  OTEL_ENABLED: ${OTEL_ENABLED:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
  DALSTON_METRICS_ENABLED: ${DALSTON_METRICS_ENABLED:-true}
  DALSTON_METRICS_PORT: 9100

# Core services environment (includes database)
x-core-env: &core-env
  <<: *common-env
  DATABASE_URL: postgresql+asyncpg://dalston:${POSTGRES_PASSWORD:-password}@postgres:5432/dalston
  DALSTON_ENGINE_UNAVAILABLE_BEHAVIOR: ${DALSTON_ENGINE_UNAVAILABLE_BEHAVIOR:-wait}
  DALSTON_ENGINE_WAIT_TIMEOUT_SECONDS: ${DALSTON_ENGINE_WAIT_TIMEOUT_SECONDS:-300}

# Dependencies for batch engines
x-batch-depends: &batch-depends
  redis:
    condition: service_healthy
    required: false
  minio-init:
    condition: service_completed_successfully
    required: false

# Dependencies for realtime engines
x-realtime-depends: &realtime-depends
  redis:
    condition: service_healthy
    required: false

# Dependencies for core services
x-core-depends: &core-depends
  postgres:
    condition: service_healthy
    required: false
  redis:
    condition: service_healthy
    required: false
  minio-init:
    condition: service_completed_successfully
    required: false

# GPU deployment configuration (used by GPU-only services like vLLM, Riva)
x-gpu-deploy: &gpu-deploy
  resources:
    reservations:
      devices:
        - driver: nvidia
          count: 1
          capabilities: [gpu]

# Log rotation: cap each container at 50 MB × 3 files = 150 MB max per service.
# Override per-service or via Docker daemon.json for a global default.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

# WebSocket healthcheck for realtime engines
x-ws-healthcheck: &ws-healthcheck
  test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 9000)); s.close()"]
  interval: 10s
  timeout: 5s
  retries: 3

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: dalston
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: dalston
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dalston"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    # AOF persistence for durable Streams (M33)
    # - appendonly yes: enables append-only file persistence
    # - appendfsync everysec: fsync every second (balance of durability and performance)
    # - auto-aof-rewrite-percentage 100: rewrite AOF when it doubles in size
    # - auto-aof-rewrite-min-size 64mb: minimum size before rewrite
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set dalston http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb dalston/$${DALSTON_S3_BUCKET:-dalston-artifacts} --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DALSTON_S3_BUCKET: ${DALSTON_S3_BUCKET:-dalston-artifacts}

  # Jaeger for distributed tracing (M19)
  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles: [observability]
    restart: unless-stopped

  # Prometheus for metrics collection (M20)
  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=1d'
      - '--storage.tsdb.retention.size=500MB'
    profiles: [observability]
    restart: unless-stopped

  # Grafana for dashboards (M20)
  grafana:
    image: grafana/grafana:10.3.0
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: dalston
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dalston-overview.json
    depends_on: [prometheus]
    profiles: [observability]
    restart: unless-stopped

  # Metrics exporter for Redis queue depths (M20)
  metrics-exporter:
    image: dalston/gateway:latest
    command: python -m dalston.metrics_exporter
    environment:
      <<: *common-env
      DALSTON_SCRAPE_INTERVAL: 15
    depends_on: *realtime-depends
    profiles: [observability]
    restart: unless-stopped

  # ============================================================
  # CORE SERVICES
  # ============================================================

  gateway:
    image: dalston/gateway:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      <<: [*core-env, *observability-env]
      DALSTON_MODEL_DIR: /models
      HF_HOME: /models/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - model-cache:/models
    depends_on: *core-depends
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging: *default-logging
    restart: unless-stopped

  orchestrator:
    image: dalston/orchestrator:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    environment:
      <<: [*core-env, *observability-env]
      DALSTON_METRICS_PORT: 8001
      # Fail fast if another orchestrator is running (dev safety)
      DALSTON_SINGLE_INSTANCE: "true"
    depends_on: *core-depends
    logging: *default-logging
    restart: unless-stopped

  # ============================================================
  # BATCH STT ENGINES
  #
  # Base definitions use CPU builds. For GPU (CUDA builds + GPU
  # resource reservations + higher concurrency), layer on
  # docker-compose.gpu.yml via:
  #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
  # ============================================================

  # --- PREPARE STAGE ---
  stt-prepare:
    image: dalston/stt-prepare:latest
    build:
      context: .
      dockerfile: engines/stt-prepare/audio-prepare/Dockerfile
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: audio-prepare
      DALSTON_WORKER_ID: prepare-1
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    logging: *default-logging
    restart: unless-stopped

  # --- TRANSCRIBE STAGE ---
  # M36: Runtime-based transcription engines. Each runtime can load any compatible
  # model variant on demand via config["runtime_model_id"].
  # Non-Riva realtime transcription is served by these unified services.

  # M63: Unified NeMo Parakeet — one process, one model, batch + realtime.
  # Supports: nvidia/parakeet-ctc-0.6b, nvidia/parakeet-ctc-1.1b,
  #           nvidia/parakeet-tdt-0.6b-v3, nvidia/parakeet-tdt-1.1b
  stt-transcribe-nemo:
    image: dalston/stt-transcribe-nemo:1.0.0
    build:
      context: .
      dockerfile: engines/stt-transcribe/nemo/Dockerfile
      args:
        DEVICE: cpu
    environment:
      <<: [*common-env, *observability-env]

      DALSTON_ENGINE_ID: nemo
      DALSTON_DEFAULT_MODEL_ID: "nvidia/parakeet-ctc-0.6b"
      DALSTON_INSTANCE: stt-transcribe-nemo
      DALSTON_WORKER_PORT: 9000
      DALSTON_MAX_SESSIONS: 2
      DALSTON_DEVICE: cpu
      DALSTON_MODEL_PRELOAD: parakeet-rnnt-0.6b
      DALSTON_RT_RESERVATION: ${DALSTON_RT_RESERVATION:-1}
      DALSTON_BATCH_MAX_INFLIGHT: ${DALSTON_BATCH_MAX_INFLIGHT:-2}
      DALSTON_TOTAL_CAPACITY: ${DALSTON_TOTAL_CAPACITY:-3}
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    healthcheck: *ws-healthcheck
    logging: *default-logging
    restart: unless-stopped

  # M63: Unified Faster Whisper — multilingual batch + realtime.
  # Uses CTranslate2 for efficient inference. Supports 99 languages.
  # Supports: tiny, base, small, medium, large-v2, large-v3, large-v3-turbo
  stt-transcribe-faster-whisper:
    image: dalston/stt-transcribe-faster-whisper:1.0.0
    build:
      context: .
      dockerfile: engines/stt-transcribe/faster-whisper/Dockerfile
      args:
        DEVICE: cpu
    environment:
      <<: [*common-env, *observability-env]

      DALSTON_ENGINE_ID: faster-whisper
      DALSTON_DEFAULT_MODEL_ID: "large-v3-turbo"
      DALSTON_INSTANCE: stt-transcribe-faster-whisper
      DALSTON_WORKER_PORT: 9000
      DALSTON_MAX_SESSIONS: 2
      DALSTON_DEVICE: cpu
      DALSTON_RT_RESERVATION: ${DALSTON_RT_RESERVATION:-1}
      DALSTON_BATCH_MAX_INFLIGHT: ${DALSTON_BATCH_MAX_INFLIGHT:-2}
      DALSTON_TOTAL_CAPACITY: ${DALSTON_TOTAL_CAPACITY:-3}
    ports:
      - "9101:9100"
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    healthcheck: *ws-healthcheck
    logging: *default-logging
    restart: unless-stopped

  # M63: Unified Parakeet ONNX — lightweight English, batch + realtime.
  # Uses ONNX Runtime instead of NeMo for ~12x smaller container image.
  # Supports: nvidia/parakeet-ctc-{0.6b,1.1b}, nvidia/parakeet-tdt-0.6b-{v2,v3}, nvidia/parakeet-rnnt-0.6b
  stt-transcribe-onnx:
    image: dalston/stt-transcribe-onnx:1.0.0
    build:
      context: .
      dockerfile: engines/stt-transcribe/onnx/Dockerfile
      args:
        DEVICE: cpu
    environment:
      <<: [*common-env, *observability-env]

      DALSTON_ENGINE_ID: onnx
      DALSTON_DEFAULT_MODEL_ID: "parakeet-onnx-ctc-0.6b"
      DALSTON_INSTANCE: stt-transcribe-onnx
      DALSTON_WORKER_PORT: 9000
      DALSTON_MAX_SESSIONS: 4
      DALSTON_DEVICE: cpu
      DALSTON_MODEL_PRELOAD: parakeet-onnx-ctc-0.6b
      DALSTON_RT_RESERVATION: ${DALSTON_RT_RESERVATION:-2}
      DALSTON_BATCH_MAX_INFLIGHT: ${DALSTON_BATCH_MAX_INFLIGHT:-4}
      DALSTON_TOTAL_CAPACITY: ${DALSTON_TOTAL_CAPACITY:-6}
    ports:
      - "9100:9100"
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    healthcheck: *ws-healthcheck
    logging: *default-logging
    restart: unless-stopped

  # vLLM Audio ASR (GPU-only — audio LLMs via vLLM)
  # Supports Voxtral and Qwen2-Audio model families
  # Models are downloaded from S3 at runtime via S3ModelStorage
  stt-transcribe-vllm-asr:
    image: dalston/stt-transcribe-vllm-asr:1.0.0
    build:
      context: .
      dockerfile: engines/stt-transcribe/vllm-asr/Dockerfile
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: vllm-asr
      DALSTON_DEFAULT_MODEL_ID: "mistralai/Voxtral-Mini-3B-2507"
      DALSTON_MODEL_TTL_SECONDS: 7200
      DALSTON_MAX_LOADED_MODELS: 1
      DALSTON_VLLM_GPU_MEMORY_UTILIZATION: "0.9"
      DALSTON_VLLM_MAX_MODEL_LEN: "4096"
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    deploy: *gpu-deploy
    profiles: [gpu]
    shm_size: '8gb'
    logging: *default-logging
    restart: unless-stopped

  # M63: Unified HF-ASR — any HuggingFace ASR model, batch + realtime.
  # Supports: Whisper, Wav2Vec2, HuBERT, MMS, and 10,000+ HF ASR models
  stt-transcribe-hf-asr:
    image: dalston/stt-transcribe-hf-asr:1.0.0
    build:
      context: .
      dockerfile: engines/stt-transcribe/hf-asr/Dockerfile
      args:
        DEVICE: cpu
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: hf-asr
      DALSTON_DEFAULT_MODEL_ID: "openai/whisper-large-v3"
      DALSTON_INSTANCE: stt-transcribe-hf-asr
      DALSTON_WORKER_PORT: 9000
      DALSTON_MAX_SESSIONS: 2
      DALSTON_DEVICE: cpu
      DALSTON_RT_RESERVATION: ${DALSTON_RT_RESERVATION:-1}
      DALSTON_BATCH_MAX_INFLIGHT: ${DALSTON_BATCH_MAX_INFLIGHT:-2}
      DALSTON_TOTAL_CAPACITY: ${DALSTON_TOTAL_CAPACITY:-3}
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    healthcheck: *ws-healthcheck
    logging: *default-logging
    restart: unless-stopped

  # --- ALIGN STAGE ---

  # Phoneme forced alignment
  stt-align-phoneme:
    image: dalston/stt-align-phoneme:latest
    build:
      context: .
      dockerfile: engines/stt-align/phoneme-align/Dockerfile
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: phoneme-align
      DALSTON_WORKER_ID: palign-cpu-1
    ports:
      - "9104:9100"
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    logging: *default-logging
    restart: unless-stopped

  # --- DIARIZE STAGE ---

  # Pyannote 4.0
  stt-diarize-pyannote-4.0:
    image: dalston/stt-diarize-pyannote-4.0:latest
    build:
      context: .
      dockerfile: engines/stt-diarize/pyannote-4.0/Dockerfile
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: pyannote-4.0
      DALSTON_WORKER_ID: pyannote-cpu-1
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "9102:9100"
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    logging: *default-logging
    restart: unless-stopped

  # NeMo MSDD Speaker Diarization (legacy — prefer pyannote-4.0 or sortformer)
  stt-diarize-nemo-msdd:
    image: dalston/stt-diarize-nemo-msdd:latest
    build:
      context: .
      dockerfile: engines/stt-diarize/nemo-msdd/Dockerfile
      args:
        SKIP_MODEL_DOWNLOAD: ${SKIP_MODEL_DOWNLOAD:-false}
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: nemo-msdd
      DALSTON_WORKER_ID: nemo-msdd-cpu1
      DALSTON_DEVICE: cpu
    volumes:
      - model-cache:/models
    shm_size: '2gb'
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    profiles: [nemo-msdd]
    logging: *default-logging
    restart: unless-stopped

  # NeMo Sortformer Speaker Diarization (GPU, ≤4 speakers)
  stt-diarize-nemo-sortformer:
    image: dalston/stt-diarize-nemo-sortformer:latest
    build:
      context: .
      dockerfile: engines/stt-diarize/nemo-sortformer/Dockerfile
      args:
        SKIP_MODEL_DOWNLOAD: ${SKIP_MODEL_DOWNLOAD:-false}
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: nemo-sortformer
      DALSTON_WORKER_ID: nemo-sortformer-gpu1
      DALSTON_DIARIZATION_DISABLED: ${DALSTON_DIARIZATION_DISABLED:-false}
      DALSTON_NEMO_ALLOW_CPU: ${DALSTON_NEMO_ALLOW_CPU:-false}
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    profiles: [gpu]
    logging: *default-logging
    restart: unless-stopped

  # NeMo Sortformer Speaker Diarization - CPU variant (slow but works, ≤4 speakers)
  stt-diarize-nemo-sortformer-cpu:
    image: dalston/stt-diarize-nemo-sortformer-cpu:latest
    build:
      context: .
      dockerfile: engines/stt-diarize/nemo-sortformer/Dockerfile
      args:
        SKIP_MODEL_DOWNLOAD: ${SKIP_MODEL_DOWNLOAD:-false}
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: nemo-sortformer
      DALSTON_WORKER_ID: nemo-sortformer-cpu1
      DALSTON_DIARIZATION_DISABLED: ${DALSTON_DIARIZATION_DISABLED:-false}
      DALSTON_NEMO_ALLOW_CPU: "true"
    volumes:
      - model-cache:/models
    shm_size: '2gb'
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    logging: *default-logging
    restart: unless-stopped

  # --- PII DETECT STAGE ---
  stt-pii-detect-presidio:
    image: dalston/stt-pii-detect-presidio:latest
    build:
      context: .
      dockerfile: engines/stt-detect/pii-presidio/Dockerfile
      args:
        DEVICE: cpu
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: pii-presidio
      DALSTON_WORKER_ID: presidio-cpu1
      DALSTON_DEVICE: cpu
    volumes:
      - model-cache:/models
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    logging: *default-logging
    restart: unless-stopped

  # --- AUDIO REDACT STAGE ---
  stt-audio-redact-audio:
    image: dalston/stt-audio-redact-audio:latest
    build:
      context: .
      dockerfile: engines/stt-redact/audio-redactor/Dockerfile
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: audio-redactor
      DALSTON_WORKER_ID: redactor-1
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    logging: *default-logging
    restart: unless-stopped

  # --- COMPOSITE ENGINES ---
  stt-combo-whisper-align-pyannote:
    image: dalston/stt-combo-whisper-align-pyannote:latest
    build:
      context: .
      dockerfile: engines/stt-combo/whisper-align-pyannote/Dockerfile
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: whisper-align-pyannote
      DALSTON_WORKER_ID: combo-wap-1
    tmpfs: /tmp:size=2g
    depends_on: *batch-depends
    logging: *default-logging
    restart: unless-stopped

  # ============================================================
  # RIVA NIM SIDECAR + ENGINES (M70)
  # ============================================================

  # Riva NIM container — shared gRPC inference sidecar for Riva engines.
  # Manages GPU, model loading, and inference scheduling.
  riva-nim:
    image: nvcr.io/nim/nvidia/riva-asr:latest
    environment:
      NIM_MANIFEST_PROFILE: default
      NIM_HTTP_API_PORT: 9080
      NIM_GRPC_API_PORT: 50051
    ports:
      - "50051:50051"
      - "9080:9080"
    volumes:
      - riva-model-cache:/opt/nim/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    profiles: [riva]
    logging: *default-logging
    restart: unless-stopped

  # Unified Riva engine — batch + realtime in one process, gRPC to NIM sidecar
  stt-transcribe-riva:
    image: dalston/stt-riva:1.1.0
    build:
      context: .
      dockerfile: engines/stt-transcribe/riva/Dockerfile
    environment:
      <<: [*common-env, *observability-env]
      DALSTON_ENGINE_ID: riva
      DALSTON_WORKER_ID: riva-unified-1
      DALSTON_INSTANCE: stt-transcribe-riva
      DALSTON_WORKER_PORT: 9000
      DALSTON_MAX_SESSIONS: 8
      DALSTON_RIVA_URI: riva-nim:50051
      DALSTON_RIVA_CHUNK_MS: 100
    tmpfs: /tmp:size=2g
    depends_on:
      <<: *batch-depends
      riva-nim:
        condition: service_healthy
    healthcheck: *ws-healthcheck
    profiles: [riva]
    logging: *default-logging
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  model-cache:        # M39: Unified model cache for all engines
  riva-model-cache:   # M70: Riva NIM model cache
  prometheus-data:
  grafana-data:
