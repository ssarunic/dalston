schema_version: "1.1"
id: stt-rt-parakeet
engine_id: nemo
stage: transcribe
mode: realtime
name: Parakeet Realtime
version: 1.0.0
description: |
  Real-time streaming transcription using NVIDIA NeMo Parakeet FastConformer.
  Cache-aware streaming for ~100ms end-to-end latency with native word timestamps.

container:
  gpu: required
  memory: 8G
  model_cache: /models/nemo

capabilities:
  native_streaming: true
  word_timestamps: true
  max_concurrency: 4

input:
  audio_formats:
    - pcm_s16le
  sample_rate: 16000
  channels: 1

hardware:
  min_vram_gb: 4
  recommended_gpu:
    - t4
    - a10g
  supports_cpu: false
  min_ram_gb: 8

performance:
  rtf_gpu: 0.0006
  warm_start_latency_ms: 100
