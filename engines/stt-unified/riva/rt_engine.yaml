schema_version: "1.1"
id: stt-unified-riva
engine_id: riva
stage: transcribe
mode: realtime
name: Riva NIM Unified
version: 1.1.0
description: |
  Unified batch + realtime transcription using NVIDIA Riva NIM as a gRPC
  sidecar.  The engine itself is a thin CPU adapter; all GPU inference runs
  in the Riva NIM container.

  Batch: streams audio chunks via streaming_recognize(interim_results=False).
  RT: VAD-chunked utterances via offline_recognize() with periodic
  re-transcription for partial results.

container:
  gpu: none
  memory: 1G

capabilities:
  max_audio_duration: 7200
  streaming: true
  word_timestamps: true
  max_concurrency: 8

input:
  audio_formats:
    - wav
    - pcm_s16le
  sample_rate: 16000
  channels: 1

hardware:
  supports_cpu: true
  min_ram_gb: 1

performance:
  rtf_gpu: 0.05
  rtf_cpu: 0.05
  warm_start_latency_ms: 50
