schema_version: "1.1"
id: stt-rt-onnx
engine_id: onnx
stage: transcribe
mode: realtime
name: ONNX Realtime
version: 1.0.0
description: |
  Real-time VAD-chunked transcription via ONNX Runtime.
  Simpler deployment than NeMo (no PyTorch) with slightly higher per-utterance latency.

container:
  gpu: optional
  memory: 4G
  model_cache: /models/onnx

capabilities:
  native_streaming: true
  word_timestamps: true
  max_concurrency: 4

input:
  audio_formats:
    - pcm_s16le
  sample_rate: 16000
  channels: 1

hardware:
  min_vram_gb: 2
  recommended_gpu:
    - t4
    - a10g
  supports_cpu: true
  min_ram_gb: 4

performance:
  rtf_gpu: 0.0003
  rtf_cpu: 0.01
  warm_start_latency_ms: 50
