schema_version: "1.1"
id: stt-rt-vllm-asr
engine_id: vllm-asr
stage: transcribe
mode: realtime
name: vLLM ASR Realtime
version: 1.0.0
description: |
  Real-time transcription using audio-capable LLMs via vLLM.
  Supports Voxtral (Mistral) and Qwen2-Audio model families.

container:
  gpu: required
  memory: 16G
  model_cache: /models/huggingface

capabilities:
  streaming: true
  max_concurrency: 2
  supports_vocabulary: false

input:
  audio_formats:
    - pcm_s16le
  sample_rate: 16000
  channels: 1

hardware:
  min_vram_gb: 8
  recommended_gpu:
    - a10g
    - a100
  supports_cpu: false
  min_ram_gb: 16

performance:
  rtf_gpu: 0.15
  warm_start_latency_ms: 5000
