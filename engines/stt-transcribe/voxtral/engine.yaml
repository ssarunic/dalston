schema_version: "1.1"
id: stt-batch-voxtral
runtime: voxtral
stage: transcribe
mode: batch
name: Voxtral Batch
version: 1.0.0
description: |
  Batch transcription using Mistral Voxtral models via HuggingFace Transformers.
  Supports Mini 3B and Small 24B variants for multilingual transcription
  across 8 languages. GPU required for inference.

  Note: Produces segment-level output without word timestamps.
  Chain with phoneme-align stage if word-level timestamps are needed.

container:
  gpu: required
  memory: 12G
  model_cache: /models

capabilities:
  languages:
    - en
    - es
    - fr
    - pt
    - hi
    - de
    - nl
    - it
  max_audio_duration: 1800
  streaming: false
  word_timestamps: false
  supports_vocabulary: false

input:
  audio_formats:
    - wav
  sample_rate: 16000
  channels: 1

hf_compat:
  pipeline_tag: automatic-speech-recognition
  library_name: transformers
  license: apache-2.0

hardware:
  min_vram_gb: 10
  recommended_gpu:
    - a10g
    - l4
    - rtx4090
  supports_cpu: false
  min_ram_gb: 16

performance:
  rtf_gpu: 0.05
  rtf_cpu: null
  warm_start_latency_ms: 500
