schema_version: "1.1"
id: vllm-asr
runtime: vllm-asr
stage: transcribe
name: vLLM Audio ASR
version: 1.0.0
description: |
  Audio-capable LLMs via vLLM for high-accuracy transcription.
  Supports Voxtral (Mistral) and Qwen2-Audio model families.

  Uses model-specific adapters for prompt building and output parsing.
  Loads models at runtime via runtime_model_id without requiring
  separate Docker images per variant.

  Note: Audio LLMs produce text only - no word timestamps.
  Use the alignment stage (phoneme-align) if word-level timing is needed.

container:
  gpu: required
  memory: 16G
  model_cache: /models/huggingface

capabilities:
  languages:
    - all  # Multilingual (model-dependent)
  max_audio_duration: 600  # LLM context limits
  streaming: false
  word_timestamps: false  # Audio LLMs don't produce timestamps

input:
  audio_formats:
    - wav
  sample_rate: 16000
  channels: 1

hf_compat:
  pipeline_tag: automatic-speech-recognition
  library_name: vllm
  license: apache-2.0

hardware:
  min_vram_gb: 8
  recommended_gpu:
    - a10g
    - l4
    - a100
  supports_cpu: false
  min_ram_gb: 16

performance:
  rtf_gpu: 0.15
  rtf_cpu: null
  warm_start_latency_ms: 5000
