schema_version: "1.1"
id: stt-batch-transcribe-riva
runtime: riva
stage: transcribe
name: Riva NIM Batch Transcription
version: 1.0.0
description: |
  Batch transcription engine using NVIDIA Riva NIM as a gRPC sidecar.
  Streams audio chunks to NIM via streaming_recognize() for robust
  processing of long recordings without gRPC deadline risk.

  The engine itself is a thin CPU adapter; all GPU inference runs
  in the Riva NIM sidecar container.

container:
  gpu: none
  memory: 1G

capabilities:
  languages:
    - en
    - es
    - fr
    - de
    - it
    - pt
    - zh
    - ja
    - ko
    - ru
  max_audio_duration: 7200
  streaming: false
  word_timestamps: true

input:
  audio_formats:
    - wav
  sample_rate: 16000
  channels: 1

hardware:
  supports_cpu: true
  min_ram_gb: 1

performance:
  rtf_gpu: 0.05
  rtf_cpu: 0.05
  warm_start_latency_ms: 50
