schema_version: "1.1"
id: parakeet-onnx-ctc-0.6b
type: realtime
name: Parakeet ONNX CTC 0.6B
version: 1.0.0
description: |
  Real-time transcription using NVIDIA Parakeet CTC 0.6B via ONNX Runtime.
  Uses VAD-chunked inference (not native streaming) for low-latency results.
  Lightweight engine: no NeMo or PyTorch required for CPU inference.
  English-only. Supports both CPU and GPU.

  NOTE: Outputs lowercase text without punctuation.

container:
  gpu: optional
  memory: 4G
  model_cache: /models

capabilities:
  max_concurrency: 4
  native_streaming: false
  word_timestamps: true
  punctuation: false
  capitalization: false

server:
  port: 9000
  protocol: websocket
  path: /session

audio:
  encodings:
    - pcm_s16le
    - pcm_f32le
  sample_rates:
    - 16000
  channels: 1

vad:
  engine: silero
  threshold: 0.5
  min_speech_duration_ms: 250
  min_silence_duration_ms: 500
  lookback_ms: 300

heartbeat:
  interval_seconds: 10
  timeout_seconds: 30

environment:
  WORKER_ID:
    description: Unique identifier for this worker
    required: true
  WORKER_PORT:
    description: WebSocket server port
    default: "9000"
  MAX_SESSIONS:
    description: Maximum concurrent sessions
    default: "4"
  REDIS_URL:
    description: Redis connection URL
    default: redis://localhost:6379
  MODEL_VARIANT:
    description: Parakeet ONNX model variant
    default: "ctc-0.6b"

hf_compat:
  pipeline_tag: automatic-speech-recognition
  library_name: onnxruntime
  license: cc-by-4.0

hardware:
  min_vram_gb: 2
  recommended_gpu:
    - t4
    - a10g
  supports_cpu: true
  min_ram_gb: 4

performance:
  rtf_gpu: 0.03
  rtf_cpu: 0.15
  warm_start_latency_ms: 50
