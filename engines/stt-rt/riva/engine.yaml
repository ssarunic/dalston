schema_version: "1.1"
id: stt-rt-riva
runtime: riva
stage: transcribe
mode: realtime
name: Riva NIM Realtime
version: 1.0.0
description: |
  Real-time streaming transcription via NVIDIA Riva NIM gRPC.
  Relays VAD-segmented audio chunks to Riva's offline_recognize and
  forwards results back to the client.

container:
  gpu: none  # GPU lives on the NIM container
  memory: 1G

capabilities:
  languages:
    - en
  streaming: false
  word_timestamps: true
  max_concurrency: 8
  supports_vocabulary: false

input:
  audio_formats:
    - pcm_s16le
  sample_rate: 16000
  channels: 1
