# Model catalog entry for parakeet-onnx-ctc-1.1b
# M41: ONNX Runtime variant of Parakeet CTC 1.1B

schema_version: "1.1"
id: parakeet-onnx-ctc-1.1b
runtime: nemo-onnx
runtime_model_id: "nvidia/parakeet-ctc-1.1b"  # Same HuggingFace model, different runtime

name: NVIDIA Parakeet ONNX CTC 1.1B
source: nvidia/parakeet-ctc-1.1b
size_gb: 1.2  # ONNX model is smaller than NeMo checkpoint
stage: transcribe

description: |
  NVIDIA Parakeet CTC 1.1B via ONNX Runtime for accurate English-only transcription.
  Larger model with better accuracy than the 0.6B variant.
  Same accuracy as the NeMo variant (parakeet-ctc-1.1b) but runs on ONNX Runtime.

  Advantages over NeMo variant:
    - ~12x smaller container image (~1GB vs ~12GB)
    - ~3x faster cold start
    - Better CPU inference (ONNX optimizations + INT8 quantization)
    - No PyTorch dependency for CPU inference

  NOTE: Outputs lowercase text without punctuation.

languages:
  - en

capabilities:
  word_timestamps: true
  punctuation: false
  capitalization: false
  streaming: false
  max_audio_duration: 7200

hardware:
  min_vram_gb: 4
  supports_cpu: true
  min_ram_gb: 8

performance:
  rtf_gpu: 0.0005
  rtf_cpu: 0.2
