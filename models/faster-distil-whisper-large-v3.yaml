# Model catalog entry for faster-distil-whisper-large-v3
# This file defines the model variant metadata for engine_id model management (M36)

schema_version: "1.1"
id: Systran/faster-distil-whisper-large-v3
engine_id: faster-whisper
loaded_model_id: "Systran/faster-distil-whisper-large-v3"  # HF repo passed to WhisperModel()

name: Faster Distil Whisper Large V3
source: Systran/faster-distil-whisper-large-v3
size_gb: 1.5
stage: transcribe

description: |
  Distilled Whisper large-v3 via faster-whisper (CTranslate2).
  Optimized for speed while maintaining high accuracy.
  Distilled from large-v3 with pruned decoder (2 layers) for ~6x faster inference.
  Supports 99 languages with automatic language detection.
  Default model for Dalston - good balance of speed, accuracy, and compatibility.

languages: null  # null means multilingual (99 languages)

capabilities:
  word_timestamps: false  # Has timestamps but they're inaccurate; use alignment stage
  punctuation: true
  capitalization: true
  native_streaming: false
  max_audio_duration: 7200

hardware:
  min_vram_gb: 4
  supports_cpu: true  # M36: CPU support enabled with int8 compute type
  min_ram_gb: 8

performance:
  rtf_gpu: 0.03
  rtf_cpu: 0.3
