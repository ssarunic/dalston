schema_version: "1.1"
id: nvidia/parakeet-tdt-0.6b-v3
engine_id: nemo
loaded_model_id: "nvidia/parakeet-tdt-0.6b-v3"  # HuggingFace ID passed to from_pretrained()

name: NVIDIA Parakeet TDT 0.6B v3
source: nvidia/parakeet-tdt-0.6b-v3
