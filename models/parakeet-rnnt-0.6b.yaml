  NVIDIA Parakeet FastConformer RNNT 0.6B for low-latency English transcription.
  RNN-Transducer decoder is streaming-capable and well-suited to real-time ASR.
  Produces native word-level timestamps without separate alignment.
  Good choice for real-time workloads and low-latency interactive use cases.

