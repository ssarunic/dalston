# Model catalog entry for parakeet-onnx-tdt-0.6b-v2
# M41: ONNX Runtime variant of Parakeet TDT 0.6B v2

schema_version: "1.1"
id: parakeet-onnx-tdt-0.6b-v2
runtime: nemo-onnx
runtime_model_id: "nvidia/parakeet-tdt-0.6b-v2"  # HuggingFace model, ONNX runtime

name: NVIDIA Parakeet ONNX TDT 0.6B v2
source: nvidia/parakeet-tdt-0.6b-v2
size_gb: 0.6
stage: transcribe

description: |
  NVIDIA Parakeet TDT 0.6B v2 via ONNX Runtime for accurate English-only
  transcription. TDT (Token-and-Duration Transducer) provides better accuracy
  than CTC while maintaining fast inference.

  Same model accuracy as the NeMo variant but runs on ONNX Runtime for
  lighter deployment and better CPU performance.

  NOTE: Outputs lowercase text without punctuation.

