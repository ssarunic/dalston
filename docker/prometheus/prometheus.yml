# Prometheus configuration for Dalston monitoring
# Enable with: docker compose --profile monitoring up -d

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Gateway metrics
  - job_name: 'dalston-gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: /metrics

  # Orchestrator metrics
  - job_name: 'dalston-orchestrator'
    static_configs:
      - targets: ['orchestrator:8001']
    metrics_path: /metrics

  # Queue metrics exporter
  - job_name: 'dalston-queue-exporter'
    static_configs:
      - targets: ['metrics-exporter:9100']
    metrics_path: /metrics

  # STT engine metrics (M20)
  # Engines expose /metrics on port 9100 via lightweight HTTP server
  - job_name: 'dalston-stt-engines'
    static_configs:
      - targets:
          - 'stt-prepare:9100'
          - 'stt-transcribe-faster-whisper:9100'
          - 'stt-transcribe-nemo:9100'
          - 'stt-transcribe-onnx:9100'
          - 'stt-transcribe-hf-asr:9100'
          - 'stt-transcribe-vllm-asr:9100'
          - 'stt-transcribe-riva:9100'
          - 'stt-align-phoneme:9100'
          - 'stt-diarize-pyannote-4.0:9100'
          - 'stt-diarize-nemo-msdd:9100'
          - 'stt-diarize-nemo-sortformer:9100'
          - 'stt-combo-whisper-align-pyannote:9100'
          - 'stt-pii-detect-presidio:9100'
          - 'stt-audio-redact-audio:9100'
    metrics_path: /metrics
